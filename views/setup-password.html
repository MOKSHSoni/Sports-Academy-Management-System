<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Registration – APEX Movement Sports Academy</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        background: var(--dark);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        font-family: "DM Sans", sans-serif;
      }
      .setup-container {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 40px;
      }
      .setup-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .setup-logo {
        width: 50px;
        height: 50px;
        background: var(--lime);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue";
        color: var(--black);
        font-size: 20px;
        margin: 0 auto 16px;
      }
      .setup-title {
        font-family: "Bebas Neue";
        font-size: 24px;
        letter-spacing: 2px;
        margin-bottom: 8px;
      }
      .setup-subtitle {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: var(--muted);
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--white);
        font-family: "DM Sans";
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
      }
      .form-group input:focus {
        border-color: var(--lime);
        background: rgba(255, 255, 255, 0.06);
      }
      .form-group input::placeholder {
        color: var(--muted);
      }
      .btn-submit {
        width: 100%;
        padding: 12px;
        background: var(--lime);
        color: var(--black);
        border: none;
        border-radius: 6px;
        font-family: "Bebas Neue";
        font-size: 16px;
        letter-spacing: 1px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 24px;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(198, 241, 53, 0.3);
      }
      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .message {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        text-align: center;
        display: none;
      }
      .message.success {
        background: rgba(76, 175, 80, 0.1);
        color: #4caf50;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }
      .message.error {
        background: rgba(255, 100, 100, 0.1);
        color: #ff6464;
        border: 1px solid rgba(255, 100, 100, 0.3);
      }
      .back-link {
        text-align: center;
        margin-top: 20px;
      }
      .back-link a {
        color: var(--lime);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s;
      }
      .back-link a:hover {
        color: #e8ff5e;
      }
    </style>
  </head>
  <body>
    <div class="setup-container">
      <div class="setup-header">
        <div class="setup-logo">A</div>
        <h1 class="setup-title">COMPLETE <span style="color: var(--lime);">SETUP</span></h1>
        <p class="setup-subtitle">Your coach application has been approved! Set your password to access your account.</p>
      </div>

      <form id="setup-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your registered email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password (min 6 characters)" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirm password" required />
        </div>
        <button type="submit" class="btn-submit">Set Password & Login</button>
        <div id="message" class="message"></div>
      </form>

      <div class="back-link">
        <a href="/login">← Back to Login</a>
      </div>
    </div>

    <script>
      document.getElementById("setup-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm-password").value;
        const messageEl = document.getElementById("message");
        const submitBtn = document.querySelector(".btn-submit");

        if (password !== confirmPassword) {
          messageEl.className = "message error";
          messageEl.textContent = "Passwords do not match";
          messageEl.style.display = "block";
          return;
        }

        if (password.length < 6) {
          messageEl.className = "message error";
          messageEl.textContent = "Password must be at least 6 characters";
          messageEl.style.display = "block";
          return;
        }

        submitBtn.disabled = true;
        messageEl.style.display = "none";

        try {
          const res = await fetch("/api/auth/setup-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, confirmPassword })
          });

          const data = await res.json();

          if (!res.ok) {
            messageEl.className = "message error";
            messageEl.textContent = data.error || "Setup failed";
            messageEl.style.display = "block";
            submitBtn.disabled = false;
            return;
          }

          messageEl.className = "message success";
          messageEl.textContent = "Password set successfully! Redirecting to login...";
          messageEl.style.display = "block";

          setTimeout(() => {
            window.location.href = "/login";
          }, 2000);
        } catch (err) {
          console.error(err);
          messageEl.className = "message error";
          messageEl.textContent = "Error setting password";
          messageEl.style.display = "block";
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
