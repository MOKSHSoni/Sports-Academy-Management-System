<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programs &amp; Coaches – APEX Admin</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      .dash-layout {
        display: flex;
        min-height: 100vh;
      }
      .dash-sidebar {
        width: 240px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        transition: transform 0.3s;
      }
      .dash-sidebar-open .dash-sidebar {
        transform: translateX(0);
      }
      .dash-logo {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }
      .dash-logo a {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .dash-logo-icon {
        width: 40px;
        height: 40px;
        background: var(--lime);
        clip-path: polygon(
          50% 0%,
          100% 25%,
          100% 75%,
          50% 100%,
          0% 75%,
          0% 25%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue";
        color: var(--black);
        font-size: 16px;
      }
      .dash-logo-text {
        font-family: "Bebas Neue";
        font-size: 20px;
        letter-spacing: 2px;
        color: var(--white);
      }
      .dash-logo-text span {
        color: var(--lime);
      }
      .dash-user {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }
      .dash-user-name {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 6px;
      }
      .dash-user-role {
        display: inline-block;
        background: rgba(198, 241, 53, 0.15);
        color: var(--lime);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 20px;
      }
      .dash-nav {
        flex: 1;
        padding: 16px 0;
        overflow-y: auto;
      }
      .dash-nav a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: all 0.2s;
        border-left: 3px solid transparent;
      }
      .dash-nav a:hover {
        color: var(--white);
        background: rgba(255, 255, 255, 0.03);
      }
      .dash-nav a.active {
        color: var(--lime);
        background: rgba(198, 241, 53, 0.06);
        border-left-color: var(--lime);
      }
      .dash-nav a.logout {
        color: #ff6464;
      }
      .dash-nav a.logout:hover {
        background: rgba(255, 100, 100, 0.1);
      }
      .dash-sidebar-toggle {
        display: none;
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 101;
        width: 44px;
        height: 44px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--white);
        font-size: 20px;
        cursor: pointer;
      }
      .dash-main {
        flex: 1;
        margin-left: 240px;
        background: var(--dark);
        min-height: 100vh;
        padding: 32px 48px 80px;
      }
      /* TABS */
      .tab-bar {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 36px;
      }
      .tab-btn {
        padding: 14px 28px;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        font-family: "Bebas Neue";
        font-size: 16px;
        letter-spacing: 2px;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab-btn:hover {
        color: var(--white);
      }
      .tab-btn.active {
        color: var(--lime);
        border-bottom-color: var(--lime);
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      /* TABLE */
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .admin-table th {
        text-align: left;
        padding: 14px 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid var(--border);
      }
      .admin-table td {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      .admin-table tr:last-child td {
        border-bottom: none;
      }
      .admin-table tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      /* SECTION HEADER */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .section-header h2 {
        font-family: "Bebas Neue";
        font-size: 24px;
        letter-spacing: 2px;
      }
      .section-header h2 span {
        color: var(--lime);
      }
      /* COACH GRID */
      .coach-admin-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      .coach-admin-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      .coach-admin-card:hover {
        transform: translateY(-4px);
        border-color: rgba(198, 241, 53, 0.2);
      }
      .coach-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--lime);
      }
      .coach-avatar-ph {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: var(--lime-dim);
        border: 2px solid rgba(198, 241, 53, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
      }
      .coach-admin-name {
        font-family: "Bebas Neue";
        font-size: 18px;
        letter-spacing: 1px;
      }
      .coach-admin-spec {
        color: var(--muted);
        font-size: 12px;
      }
      .coach-admin-exp {
        font-size: 12px;
        color: var(--lime);
        font-weight: 600;
      }
      .coach-admin-actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      /* BUTTONS */
      .btn-edit {
        background: var(--lime-dim);
        color: var(--lime);
        border: 1px solid rgba(198, 241, 53, 0.3);
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-edit:hover {
        background: rgba(198, 241, 53, 0.2);
      }
      .btn-del {
        background: rgba(255, 100, 100, 0.1);
        color: #ff6464;
        border: 1px solid rgba(255, 100, 100, 0.3);
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-del:hover {
        background: rgba(255, 100, 100, 0.2);
      }
      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 2000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 36px;
        width: 100%;
        max-width: 540px;
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-title {
        font-family: "Bebas Neue";
        font-size: 24px;
        letter-spacing: 2px;
        margin-bottom: 24px;
      }
      .modal-title span {
        color: var(--lime);
      }
      .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 24px;
        cursor: pointer;
        transition: color 0.2s;
      }
      .modal-close:hover {
        color: var(--white);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .modal-footer {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        justify-content: flex-end;
      }
      .admin-empty {
        color: var(--muted);
        padding: 32px;
        text-align: center;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      @media (max-width: 1100px) {
        .coach-admin-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 900px) {
        .dash-main {
          margin-left: 0;
          padding-top: 72px;
          padding-left: 24px;
          padding-right: 24px;
        }
        .dash-sidebar {
          transform: translateX(-100%);
        }
        .dash-sidebar-open .dash-sidebar {
          transform: translateX(0);
        }
        .dash-sidebar-toggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .admin-table {
          display: block;
          overflow-x: auto;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .coach-admin-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 600px) {
        .dash-main {
          padding: 24px 16px 60px;
          padding-top: 72px;
        }
      }
    </style>
  </head>
  <body class="dash-body">
    <button
      type="button"
      class="dash-sidebar-toggle"
      id="sidebar-toggle"
      aria-label="Toggle menu"
    >
      ☰
    </button>

    <div class="dash-layout">
      <aside class="dash-sidebar">
        <div class="dash-logo">
          <a href="/"
            ><div class="dash-logo-icon">A</div>
            <span class="dash-logo-text">APEX<span>Academy</span></span></a
          >
        </div>
        <div class="dash-user">
          <div class="dash-user-name" id="user-name">—</div>
          <span class="dash-user-role">Admin</span>
        </div>
        <nav class="dash-nav">
          <a href="/admin">Dashboard</a>
          <a href="/admin/programs" class="active">Programs &amp; Coaches</a>
          <a href="/admin/students">Students &amp; Events</a>
          <a href="/admin/users">User Roles</a>
          <a href="/admin/applications">Coach Applications</a>
          <a href="#" class="logout" id="logout-link">Logout</a>
        </nav>
      </aside>

      <main class="dash-main">
        <h1
          style="
            font-family: &quot;Bebas Neue&quot;;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 32px;
          "
        >
          PROGRAMS &amp; <span style="color: var(--lime)">COACHES</span>
        </h1>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="programs">Programs</button>
          <button class="tab-btn" data-tab="coaches">Coaches</button>
        </div>

        <div class="tab-panel active" id="tab-programs">
          <div class="section-header">
            <h2>ALL <span>PROGRAMS</span></h2>
            <button
              class="btn-primary"
              style="font-size: 13px; padding: 10px 20px"
              id="add-program-btn"
            >
              + Add Program
            </button>
          </div>
          <div id="programs-wrap">
            <p style="color: var(--muted)">Loading...</p>
          </div>
        </div>

        <div class="tab-panel" id="tab-coaches">
          <div class="section-header">
            <h2>ALL <span>COACHES</span></h2>
            <button
              class="btn-primary"
              style="font-size: 13px; padding: 10px 20px"
              id="add-coach-btn"
            >
              + Add Coach
            </button>
          </div>
          <div class="coach-admin-grid" id="coaches-wrap"></div>
        </div>
      </main>
    </div>

    <!-- PROGRAM MODAL -->
    <div class="modal-overlay" id="program-modal">
      <div class="modal">
        <button class="modal-close" id="pm-close">✕</button>
        <div class="modal-title" id="pm-title">ADD <span>PROGRAM</span></div>
        <form id="program-form">
          <input type="hidden" id="pm-id" />
          <div class="form-group">
            <label class="form-label">Program Name *</label>
            <input
              type="text"
              class="form-control"
              id="pm-name"
              placeholder="e.g. Parkour Foundations"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Sport *</label>
              <select class="form-control" id="pm-sport" required>
                <option value="">Select sport</option>
                <option value="parkour">🏃 Parkour</option>
                <option value="calisthenics">💪 Calisthenics</option>
                <option value="rock_climbing">🧗 Rock Climbing</option>
                <option value="acrobatics">🤸 Acrobatics</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Skill Level *</label>
              <select class="form-control" id="pm-level" required>
                <option value="">Select level</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Age Group *</label>
              <select class="form-control" id="pm-age" required>
                <option value="">Select age group</option>
                <option value="kids">Kids (6–12)</option>
                <option value="teen">Teen (13–17)</option>
                <option value="adult">Adult (18–40)</option>
                <option value="senior">Senior (40+)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Assign Coach</label>
              <select class="form-control" id="pm-coach">
                <option value="">No coach assigned</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Fees (₹) *</label>
              <input
                type="number"
                class="form-control"
                id="pm-fees"
                placeholder="2700.00"
                step="0.01"
                min="0"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Max Capacity *</label>
              <input
                type="number"
                class="form-control"
                id="pm-capacity"
                placeholder="20"
                min="1"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea
              class="form-control"
              id="pm-desc"
              rows="3"
              placeholder="What students will learn..."
            ></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-ghost" id="pm-cancel">
              Cancel
            </button>
            <button type="submit" class="btn-primary" id="pm-submit">
              Save Program
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- COACH MODAL -->
    <div class="modal-overlay" id="coach-modal">
      <div class="modal">
        <button class="modal-close" id="cm-close">✕</button>
        <div class="modal-title" id="cm-title">ADD <span>COACH</span></div>
        <form id="coach-form">
          <input type="hidden" id="cm-id" />
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input
                type="text"
                class="form-control"
                id="cm-name"
                placeholder="Coach full name"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Sport *</label>
              <select class="form-control" id="cm-sport" required>
                <option value="">Select sport</option>
                <option value="parkour">🏃 Parkour</option>
                <option value="calisthenics">💪 Calisthenics</option>
                <option value="rock_climbing">🧗 Rock Climbing</option>
                <option value="acrobatics">🤸 Acrobatics</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Specialization</label>
              <input
                type="text"
                class="form-control"
                id="cm-spec"
                placeholder="e.g. Urban Freerunning"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Years Experience</label>
              <input
                type="number"
                class="form-control"
                id="cm-exp"
                placeholder="5"
                min="0"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Photo URL</label>
            <input
              type="url"
              class="form-control"
              id="cm-photo"
              placeholder="https://..."
            />
          </div>
          <div class="form-group">
            <label class="form-label">Bio</label>
            <textarea
              class="form-control"
              id="cm-bio"
              rows="3"
              placeholder="Short coach biography..."
            ></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-ghost" id="cm-cancel">
              Cancel
            </button>
            <button type="submit" class="btn-primary" id="cm-submit">
              Save Coach
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
      (function () {
        let allCoaches = [];

        /* TABS */
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".tab-btn")
              .forEach((b) => b.classList.remove("active"));
            document
              .querySelectorAll(".tab-panel")
              .forEach((p) => p.classList.remove("active"));
            btn.classList.add("active");
            document
              .getElementById("tab-" + btn.dataset.tab)
              .classList.add("active");
          });
        });

        /* MODAL HELPERS */
        const openModal = (id) =>
          document.getElementById(id).classList.add("open");
        const closeModal = (id) =>
          document.getElementById(id).classList.remove("open");
        document
          .getElementById("pm-close")
          .addEventListener("click", () => closeModal("program-modal"));
        document
          .getElementById("pm-cancel")
          .addEventListener("click", () => closeModal("program-modal"));
        document
          .getElementById("cm-close")
          .addEventListener("click", () => closeModal("coach-modal"));
        document
          .getElementById("cm-cancel")
          .addEventListener("click", () => closeModal("coach-modal"));
        document
          .getElementById("program-modal")
          .addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal("program-modal");
          });
        document
          .getElementById("coach-modal")
          .addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeModal("coach-modal");
          });

        function fillCoachSelect(selectedId) {
          const sel = document.getElementById("pm-coach");
          sel.innerHTML =
            '<option value="">No coach assigned</option>' +
            allCoaches
              .map(
                (c) =>
                  `<option value="${c.coach_id}" ${c.coach_id == selectedId ? "selected" : ""}>${c.name} — ${c.sport}</option>`,
              )
              .join("");
        }

        /* LOAD PROGRAMS */
        async function loadPrograms() {
          const wrap = document.getElementById("programs-wrap");
          try {
            const progs = await apiCall("/api/programs");
            if (!progs.length) {
              wrap.innerHTML =
                '<div class="admin-empty">No programs yet. Add your first one above.</div>';
              return;
            }
            wrap.innerHTML = `
            <table class="admin-table">
              <thead><tr>
                <th>Name</th><th>Sport</th><th>Level</th><th>Age Group</th>
                <th>Coach</th><th>Fees</th><th>Enrolled / Cap</th><th>Actions</th>
              </tr></thead>
              <tbody>${progs
                .map(
                  (p) => `
                <tr>
                  <td><strong>${p.name}</strong></td>
                  <td>${sportBadge(p.sport)}</td>
                  <td>${levelBadge(p.skill_level)}</td>
                  <td style="color:var(--muted);font-size:13px">${p.age_group}</td>
                  <td style="font-size:13px">${p.coach_name || "—"}</td>
                  <td>₹ ${Number(p.fees).toFixed(2)}</td>
                  <td><span style="color:var(--lime);font-weight:600">${p.current_enrolled}</span> / ${p.max_capacity}</td>
                  <td>
                    <button class="btn-edit" data-id="${p.program_id}">Edit</button>
                    <button class="btn-del"  data-id="${p.program_id}">Delete</button>
                  </td>
                </tr>`,
                )
                .join("")}
              </tbody>
            </table>`;

            wrap.querySelectorAll(".btn-edit").forEach((btn) => {
              btn.addEventListener("click", () => {
                const p = progs.find((x) => x.program_id == btn.dataset.id);
                if (!p) return;
                document.getElementById("pm-title").innerHTML =
                  "EDIT <span>PROGRAM</span>";
                document.getElementById("pm-id").value = p.program_id;
                document.getElementById("pm-name").value = p.name;
                document.getElementById("pm-sport").value = p.sport;
                document.getElementById("pm-level").value = p.skill_level;
                document.getElementById("pm-age").value = p.age_group;
                document.getElementById("pm-fees").value = p.fees;
                document.getElementById("pm-capacity").value = p.max_capacity;
                document.getElementById("pm-desc").value = p.description || "";
                fillCoachSelect(p.coach_id);
                openModal("program-modal");
              });
            });

            wrap.querySelectorAll(".btn-del").forEach((btn) => {
              btn.addEventListener("click", async () => {
                if (!confirm("Delete this program? This cannot be undone."))
                  return;
                try {
                  await apiCall(`/api/programs/${btn.dataset.id}`, "DELETE");
                  showToast("Program deleted", "success");
                  loadPrograms();
                } catch (err) {
                  showToast(err.message, "error");
                }
              });
            });
          } catch (err) {
            wrap.innerHTML =
              '<div class="admin-empty">Failed to load programs.</div>';
          }
        }

        /* LOAD COACHES */
        async function loadCoaches() {
          const wrap = document.getElementById("coaches-wrap");
          try {
            allCoaches = await apiCall("/api/coaches");
            if (!allCoaches.length) {
              wrap.innerHTML =
                '<div class="admin-empty" style="grid-column:1/-1">No coaches yet.</div>';
              return;
            }
            wrap.innerHTML = allCoaches
              .map(
                (c) => `
            <div class="coach-admin-card">
              ${
                c.photo_url
                  ? `<img src="${c.photo_url}" alt="${c.name}" class="coach-avatar" onerror="this.style.display='none'">`
                  : `<div class="coach-avatar-ph">🧑‍🏫</div>`
              }
              <div class="coach-admin-name">${c.name}</div>
              ${sportBadge(c.sport)}
              <div class="coach-admin-spec">${c.specialization || "—"}</div>
              <div class="coach-admin-exp">${c.experience_years || 0} yrs experience</div>
              <div class="coach-admin-actions">
                <button class="btn-edit" data-id="${c.coach_id}">Edit</button>
                <button class="btn-del"  data-id="${c.coach_id}">Delete</button>
              </div>
            </div>`,
              )
              .join("");

            wrap.querySelectorAll(".btn-edit").forEach((btn) => {
              btn.addEventListener("click", () => {
                const c = allCoaches.find((x) => x.coach_id == btn.dataset.id);
                if (!c) return;
                document.getElementById("cm-title").innerHTML =
                  "EDIT <span>COACH</span>";
                document.getElementById("cm-id").value = c.coach_id;
                document.getElementById("cm-name").value = c.name;
                document.getElementById("cm-sport").value = c.sport;
                document.getElementById("cm-spec").value =
                  c.specialization || "";
                document.getElementById("cm-exp").value =
                  c.experience_years || "";
                document.getElementById("cm-photo").value = c.photo_url || "";
                document.getElementById("cm-bio").value = c.bio || "";
                openModal("coach-modal");
              });
            });

            wrap.querySelectorAll(".btn-del").forEach((btn) => {
              btn.addEventListener("click", async () => {
                if (!confirm("Delete this coach?")) return;
                try {
                  await apiCall(`/api/coaches/${btn.dataset.id}`, "DELETE");
                  showToast("Coach deleted", "success");
                  loadCoaches();
                } catch (err) {
                  showToast(err.message, "error");
                }
              });
            });
          } catch (err) {
            wrap.innerHTML =
              '<div class="admin-empty" style="grid-column:1/-1">Failed to load coaches.</div>';
          }
        }

        /* ADD PROGRAM */
        document
          .getElementById("add-program-btn")
          .addEventListener("click", () => {
            document.getElementById("pm-title").innerHTML =
              "ADD <span>PROGRAM</span>";
            document.getElementById("program-form").reset();
            document.getElementById("pm-id").value = "";
            fillCoachSelect(null);
            openModal("program-modal");
          });

        /* PROGRAM SUBMIT */
        document
          .getElementById("program-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("pm-id").value;
            const btn = document.getElementById("pm-submit");
            btn.disabled = true;
            btn.textContent = "Saving...";
            const body = {
              name: document.getElementById("pm-name").value,
              sport: document.getElementById("pm-sport").value,
              skill_level: document.getElementById("pm-level").value,
              age_group: document.getElementById("pm-age").value,
              coach_id: document.getElementById("pm-coach").value || null,
              fees: parseFloat(document.getElementById("pm-fees").value),
              max_capacity: parseInt(
                document.getElementById("pm-capacity").value,
                10,
              ),
              description: document.getElementById("pm-desc").value,
            };
            try {
              if (id) {
                await apiCall(`/api/programs/${id}`, "PUT", body);
                showToast("Program updated!", "success");
              } else {
                await apiCall("/api/programs", "POST", body);
                showToast("Program created!", "success");
              }
              closeModal("program-modal");
              loadPrograms();
            } catch (err) {
              showToast(err.message, "error");
            }
            btn.disabled = false;
            btn.textContent = "Save Program";
          });

        /* ADD COACH */
        document
          .getElementById("add-coach-btn")
          .addEventListener("click", () => {
            document.getElementById("cm-title").innerHTML =
              "ADD <span>COACH</span>";
            document.getElementById("coach-form").reset();
            document.getElementById("cm-id").value = "";
            openModal("coach-modal");
          });

        /* COACH SUBMIT */
        document
          .getElementById("coach-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("cm-id").value;
            const btn = document.getElementById("cm-submit");
            btn.disabled = true;
            btn.textContent = "Saving...";
            const body = {
              name: document.getElementById("cm-name").value,
              sport: document.getElementById("cm-sport").value,
              specialization: document.getElementById("cm-spec").value,
              experience_years:
                parseInt(document.getElementById("cm-exp").value, 10) || 0,
              photo_url: document.getElementById("cm-photo").value,
              bio: document.getElementById("cm-bio").value,
            };
            try {
              if (id) {
                await apiCall(`/api/coaches/${id}`, "PUT", body);
                showToast("Coach updated!", "success");
              } else {
                await apiCall("/api/coaches", "POST", body);
                showToast("Coach added!", "success");
              }
              closeModal("coach-modal");
              loadCoaches();
            } catch (err) {
              showToast(err.message, "error");
            }
            btn.disabled = false;
            btn.textContent = "Save Coach";
          });

        /* INIT */
        async function init() {
          const res = await fetch("/api/auth/me");
          const auth = await res.json();
          if (!auth.authenticated) {
            window.location.href = "/login";
            return;
          }
          if (auth.user.role !== "admin") {
            window.location.href = "/";
            return;
          }
          currentUser = auth.user;
          document.getElementById("user-name").textContent = currentUser.name;
          await Promise.all([loadPrograms(), loadCoaches()]);
          document
            .getElementById("logout-link")
            .addEventListener("click", (e) => {
              e.preventDefault();
              logout();
            });
          document
            .getElementById("sidebar-toggle")
            .addEventListener("click", () => {
              document.body.classList.toggle("dash-sidebar-open");
            });
        }

        document.addEventListener("DOMContentLoaded", init);
      })();
    </script>
  </body>
</html>
