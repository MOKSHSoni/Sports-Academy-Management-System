<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings – APEX Movement Sports Academy</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      .dash-layout {
        display: flex;
        min-height: 100vh;
      }
      .dash-sidebar {
        width: 240px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        transition: transform 0.3s;
      }
      .dash-sidebar-open .dash-sidebar {
        transform: translateX(0);
      }
      .dash-logo {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }
      .dash-logo a {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .dash-logo-icon {
        width: 40px;
        height: 40px;
        background: var(--lime);
        clip-path: polygon(
          50% 0%,
          100% 25%,
          100% 75%,
          50% 100%,
          0% 75%,
          0% 25%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue";
        color: var(--black);
        font-size: 16px;
      }
      .dash-logo-text {
        font-family: "Bebas Neue";
        font-size: 20px;
        letter-spacing: 2px;
        color: var(--white);
      }
      .dash-logo-text span {
        color: var(--lime);
      }
      .dash-user {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }
      .dash-user-name {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 6px;
      }
      .dash-user-role {
        display: inline-block;
        background: var(--lime-dim);
        color: var(--lime);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 20px;
      }
      .dash-nav {
        flex: 1;
        padding: 16px 0;
        overflow-y: auto;
      }
      .dash-nav a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: all 0.2s;
        border-left: 3px solid transparent;
      }
      .dash-nav a:hover {
        color: var(--white);
        background: rgba(255, 255, 255, 0.03);
      }
      .dash-nav a.active {
        color: var(--lime);
        background: rgba(198, 241, 53, 0.06);
        border-left-color: var(--lime);
      }
      .dash-nav a.logout {
        color: #ff6464;
      }
      .dash-nav a.logout:hover {
        background: rgba(255, 100, 100, 0.1);
      }
      .dash-sidebar-toggle {
        display: none;
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 101;
        width: 44px;
        height: 44px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--white);
        font-size: 20px;
        cursor: pointer;
      }
      .dash-main {
        flex: 1;
        margin-left: 240px;
        background: var(--dark);
        min-height: 100vh;
        padding: 32px 48px 80px;
      }

      .bookings-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 32px;
        border-bottom: 1px solid var(--border);
      }
      .bookings-tab {
        background: transparent;
        border: none;
        padding: 14px 24px;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
        border-bottom: 3px solid transparent;
      }
      .bookings-tab:hover {
        color: var(--white);
      }
      .bookings-tab.active {
        color: var(--lime);
        border-bottom-color: var(--lime);
      }
      .bookings-panel {
        display: none;
      }
      .bookings-panel.active {
        display: block;
      }

      .bookings-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .bookings-table th {
        text-align: left;
        padding: 16px 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid var(--border);
      }
      .bookings-table td {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      .bookings-table tr:last-child td {
        border-bottom: none;
      }
      .bookings-table tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .status-badge.active {
        background: rgba(198, 241, 53, 0.2);
        color: var(--lime);
      }
      .status-badge.registered {
        background: rgba(198, 241, 53, 0.2);
        color: var(--lime);
      }
      .status-badge.cancelled {
        background: rgba(255, 100, 100, 0.2);
        color: #ff6464;
      }
      .status-badge.completed {
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }
      .btn-cancel {
        background: transparent;
        border: 1px solid #ff6464;
        color: #ff6464;
        padding: 8px 16px;
        border-radius: var(--radius);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-cancel:hover {
        background: rgba(255, 100, 100, 0.15);
      }
      .btn-cancel:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .bookings-empty {
        text-align: center;
        padding: 60px 24px;
        color: var(--muted);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .bookings-empty p {
        margin-bottom: 8px;
      }
      .bookings-empty a {
        color: var(--lime);
      }

      @media (max-width: 900px) {
        .dash-main {
          margin-left: 0;
          padding-top: 72px;
          padding-left: 24px;
          padding-right: 24px;
        }
        .dash-sidebar {
          transform: translateX(-100%);
        }
        .dash-sidebar-open .dash-sidebar {
          transform: translateX(0);
        }
        .dash-sidebar-toggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .bookings-table {
          display: block;
        }
        .bookings-table thead {
          display: none;
        }
        .bookings-table tr {
          display: block;
          margin-bottom: 16px;
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        }
        .bookings-table td {
          display: block;
          border-bottom: 1px solid var(--border);
          padding: 12px 16px;
        }
        .bookings-table td::before {
          content: attr(data-label);
          display: block;
          font-size: 11px;
          color: var(--muted);
          margin-bottom: 4px;
        }
        .bookings-table td:last-child {
          border-bottom: none;
        }
      }
      @media (max-width: 600px) {
        .dash-main {
          padding: 24px 16px 60px;
          padding-top: 72px;
        }
      }
    </style>
  </head>
  <body class="dash-body">
    <button
      type="button"
      class="dash-sidebar-toggle"
      id="sidebar-toggle"
      aria-label="Toggle menu"
    >
      ☰
    </button>

    <div class="dash-layout">
      <aside class="dash-sidebar">
        <div class="dash-logo">
          <a href="/">
            <div class="dash-logo-icon">A</div>
            <span class="dash-logo-text">ATHLE<span>TICA</span></span>
          </a>
        </div>
        <div class="dash-user">
          <div class="dash-user-name" id="user-name">—</div>
          <span class="dash-user-role">Student</span>
        </div>
        <nav class="dash-nav">
          <a href="/student/dashboard">Dashboard</a>
          <a href="/student/bookings" class="active">My Bookings</a>
          <a href="/apply-for-coach">Become a Coach</a>
          <a href="/">←  Back to Website</a>
          <a href="#" class="logout" id="logout-link">Logout</a>
        </nav>
      </aside>

      <main class="dash-main">
        <h1
          style="
            font-family: &quot;Bebas Neue&quot;;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 32px;
          "
        >
          MY <span style="color: var(--lime)">BOOKINGS</span>
        </h1>

        <div class="bookings-tabs">
          <button type="button" class="bookings-tab active" data-tab="programs">
            My Programs
          </button>
          <button type="button" class="bookings-tab" data-tab="events">
            My Events
          </button>
        </div>

        <div id="panel-programs" class="bookings-panel active">
          <div id="programs-content"></div>
          <div id="programs-empty" class="bookings-empty" style="display: none">
            <p>No program enrollments yet.</p>
            <p><a href="/programs">Browse programs</a> to enroll.</p>
          </div>
        </div>

        <div id="panel-events" class="bookings-panel">
          <div id="events-content"></div>
          <div id="events-empty" class="bookings-empty" style="display: none">
            <p>No event registrations yet.</p>
            <p><a href="/events">View events</a> to register.</p>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/main.js"></script>
    <script>
      (function () {
        function statusClass(s) {
          const v = (s || "").toLowerCase();
          if (v === "active" || v === "registered")
            return v === "active" ? "active" : "registered";
          if (v === "cancelled") return "cancelled";
          return "completed";
        }

        function formatDate(d) {
          if (!d) return "—";
          const x = new Date(d);
          return x.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "short",
            year: "numeric",
          });
        }

        function formatTime(t) {
          if (!t) return "—";
          const s = String(t);
          return s.length >= 5 ? s.slice(0, 5) : s;
        }

        function sportBadgeSafe(sport) {
          const s = (sport || "").toLowerCase().replace(" ", "_");
          return typeof sportBadge === "function"
            ? sportBadge(s)
            : `<span class="badge badge-${s}">${s.replace("_", " ")}</span>`;
        }

        function renderPrograms(enrollments) {
          const content = document.getElementById("programs-content");
          const empty = document.getElementById("programs-empty");
          if (!enrollments || enrollments.length === 0) {
            content.innerHTML = "";
            empty.style.display = "block";
            content.style.display = "none";
            return;
          }
          empty.style.display = "none";
          content.style.display = "block";
          content.innerHTML = `
            <table class="bookings-table">
              <thead>
                <tr>
                  <th>Program</th>
                  <th>Sport</th>
                  <th>Fees</th>
                  <th>Enrolled</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${enrollments
                  .map(
                    (e) => `
                  <tr>
                    <td data-label="Program">${e.program_name || "—"}</td>
                    <td data-label="Sport">${sportBadgeSafe(e.sport)}</td>
                    <td data-label="Fees">${e.fees != null ? "₹ " + Number(e.fees).toLocaleString() : "—"}</td>
                    <td data-label="Enrolled">${formatDate(e.enrolled_at)}</td>
                    <td data-label="Status"><span class="status-badge ${statusClass(e.status)}">${(e.status || "").toLowerCase()}</span></td>
                    <td data-label="">
                      ${e.status === "active" ? `<button type="button" class="btn-cancel" data-type="enrollment" data-id="${e.enrollment_id}">Cancel</button>` : ""}
                    </td>
                  </tr>`,
                  )
                  .join("")}
              </tbody>
            </table>`;
          content
            .querySelectorAll(".btn-cancel[data-type='enrollment']")
            .forEach((btn) => {
              btn.addEventListener("click", () =>
                handleCancel(btn, "enrollment"),
              );
            });
        }

        function renderEvents(events) {
          const content = document.getElementById("events-content");
          const empty = document.getElementById("events-empty");
          if (!events || events.length === 0) {
            content.innerHTML = "";
            empty.style.display = "block";
            content.style.display = "none";
            return;
          }
          empty.style.display = "none";
          content.style.display = "block";
          const statusVal = (s) =>
            s === "registered" ? "registered" : (s || "").toLowerCase();
          content.innerHTML = `
            <table class="bookings-table">
              <thead>
                <tr>
                  <th>Event</th>
                  <th>Sport</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Location</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${events
                  .map(
                    (e) => `
                  <tr>
                    <td data-label="Event">${e.title || "—"}</td>
                    <td data-label="Sport">${sportBadgeSafe(e.sport)}</td>
                    <td data-label="Date">${formatDate(e.event_date)}</td>
                    <td data-label="Time">${formatTime(e.event_time)}</td>
                    <td data-label="Location">${e.location || "—"}</td>
                    <td data-label="Status"><span class="status-badge ${statusClass(e.status)}">${statusVal(e.status)}</span></td>
                    <td data-label="">
                      ${e.status === "registered" ? `<button type="button" class="btn-cancel" data-type="event" data-id="${e.reg_id}">Cancel</button>` : ""}
                    </td>
                  </tr>`,
                  )
                  .join("")}
              </tbody>
            </table>`;
          content
            .querySelectorAll(".btn-cancel[data-type='event']")
            .forEach((btn) => {
              btn.addEventListener("click", () => handleCancel(btn, "event"));
            });
        }

        async function handleCancel(btn, type) {
          if (!confirm("Are you sure you want to cancel?")) return;
          const id = btn.dataset.id;
          btn.disabled = true;
          try {
            const path =
              type === "enrollment"
                ? `/api/bookings/cancel-enrollment/${id}`
                : `/api/bookings/cancel-event/${id}`;
            await apiCall(path, "PUT");
            showToast("Cancelled successfully", "success");
            await loadBookings();
          } catch (err) {
            showToast(err.message || "Failed to cancel", "error");
            btn.disabled = false;
          }
        }

        async function loadBookings() {
          const data = await apiCall("/api/bookings/my");
          renderPrograms(data.enrollments || []);
          renderEvents(data.events || []);
        }

        async function init() {
          const authRes = await fetch("/api/auth/me");
          const auth = await authRes.json();
          if (!auth.authenticated || !auth.user) {
            window.location.href = "/login";
            return;
          }
          if (auth.user.role === "admin") {
            window.location.href = "/admin";
            return;
          }
          currentUser = auth.user;
          document.getElementById("user-name").textContent = currentUser.name;

          try {
            await loadBookings();
          } catch (err) {
            showToast(err.message || "Failed to load bookings", "error");
          }

          document.querySelectorAll(".bookings-tab").forEach((tab) => {
            tab.addEventListener("click", () => {
              const t = tab.dataset.tab;
              document
                .querySelectorAll(".bookings-tab")
                .forEach((b) => b.classList.remove("active"));
              document
                .querySelectorAll(".bookings-panel")
                .forEach((p) => p.classList.remove("active"));
              tab.classList.add("active");
              document.getElementById("panel-" + t).classList.add("active");
            });
          });

          document
            .getElementById("logout-link")
            .addEventListener("click", (e) => {
              e.preventDefault();
              logout();
            });

          document
            .getElementById("sidebar-toggle")
            .addEventListener("click", () => {
              document.body.classList.toggle("dash-sidebar-open");
            });
        }

        document.addEventListener("DOMContentLoaded", init);
      })();
    </script>
  </body>
</html>
